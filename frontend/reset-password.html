<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title>Восстановление пароля</title>

    <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,300,400,600,700,800,900" rel="stylesheet">
    <link href="css/sb-admin-2.min.css" rel="stylesheet">
    <style>
        .password-toggle-wrap {
            position: relative;
        }

        .password-toggle-input {
            padding-right: 110px;
        }

        .password-toggle-button {
            position: absolute;
            top: 50%;
            right: 16px;
            transform: translateY(-50%);
            border: 0;
            background: transparent;
            color: #4e73df;
            font-weight: 700;
            font-size: 0.85rem;
            padding: 0;
        }

        .password-toggle-button:focus {
            outline: none;
        }

        .auth-card-note {
            font-size: 0.9rem;
            color: #858796;
        }
    </style>
    <script src="js/app-auth.js?v=20260419a"></script>
</head>

<body class="bg-gradient-primary">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-xl-10 col-lg-12 col-md-9">
                <div class="card o-hidden border-0 shadow-lg my-5">
                    <div class="card-body p-0">
                        <div class="row">
                            <div class="col-lg-6 d-none d-lg-block bg-login-image"></div>

                            <div class="col-lg-6">
                                <div class="p-5">
                                    <div class="text-center">
                                        <h1 id="resetPasswordTitle" class="h4 text-gray-900 mb-3">Восстановление пароля</h1>
                                        <p id="resetPasswordDescription" class="auth-card-note mb-4">
                                            Введите логин, и мы отправим инструкцию по сбросу пароля.
                                        </p>
                                    </div>

                                    <div data-page-alerts></div>

                                    <section id="forgotPasswordSection">
                                        <form class="user" id="forgotPasswordForm">
                                            <div class="form-group">
                                                <input id="forgotUsername" type="text" class="form-control form-control-user" placeholder="Логин" autocomplete="username">
                                            </div>

                                            <button id="forgotPasswordBtn" type="submit" class="btn btn-primary btn-user btn-block">
                                                Отправить инструкцию
                                            </button>
                                        </form>
                                    </section>

                                    <section id="setPasswordSection" class="d-none">
                                        <form class="user" id="resetPasswordForm">
                                            <div class="form-group password-toggle-wrap">
                                                <input id="newPassword" type="password" class="form-control form-control-user password-toggle-input" placeholder="Новый пароль" autocomplete="new-password">
                                                <button type="button" class="password-toggle-button" data-password-toggle="newPassword" aria-label="Показать пароль">
                                                    Показать
                                                </button>
                                            </div>

                                            <div class="form-group password-toggle-wrap">
                                                <input id="confirmPassword" type="password" class="form-control form-control-user password-toggle-input" placeholder="Повторите пароль" autocomplete="new-password">
                                                <button type="button" class="password-toggle-button" data-password-toggle="confirmPassword" aria-label="Показать пароль">
                                                    Показать
                                                </button>
                                            </div>

                                            <button id="resetPasswordBtn" type="submit" class="btn btn-primary btn-user btn-block">
                                                Сохранить пароль
                                            </button>
                                        </form>
                                    </section>

                                    <hr>

                                    <div class="text-center">
                                        <a href="/login" class="small">Вернуться ко входу</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="vendor/jquery/jquery.min.js"></script>
    <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="vendor/jquery-easing/jquery.easing.min.js"></script>
    <script src="js/sb-admin-2.min.js"></script>
    <script src="js/reset-password.js?v=20260419a"></script>
</body>

</html>
