        <div id="content-wrapper" class="d-flex flex-column">

            <div id="content">

                <nav class="navbar navbar-expand navbar-light bg-white topbar mb-4 static-top shadow">

                    <button id="sidebarToggleTop" class="btn btn-link d-md-none rounded-circle mr-3">

                    </button>

                    <!-- КАРТА СНАЧАЛА -->
                    <h1 class="h3 mb-4 text-gray-800">Карта техники</h1>

                    <div class="card shadow mb-4">
                        <div class="card-header py-3">
                            <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between">
                                <h6 class="m-0 font-weight-bold text-primary">Местоположение</h6>
                                <button id="clearTelemetryButton" type="button" class="btn btn-outline-danger btn-sm mt-3 mt-md-0" data-requires-admin hidden>
                                    Очистить трек
                                </button>
                            </div>
                        </div>

                        <div class="card-body">
                            <div id="map" style="width:100%; height:400px;"></div>
                            <div id="zone-entry-banner" class="zone-entry-banner hidden"></div>
                        </div>
                    </div>


                    <!-- ТЕКУЩЕЕ СОСТОЯНИЕ -->
                    <h1 class="h3 mb-4 text-gray-800">Текущее состояние</h1>

                    <div class="card shadow mb-4">

                        <div class="card-header py-3">
                            <h6 class="m-0 font-weight-bold text-primary">Сводка по технике</h6>
                        </div>

                        <div class="card-body dashboard-status-card">
                            <div class="row">
                                <div class="col-lg-3 col-md-6 mb-4 mb-lg-0">
                                    <div class="text-xs font-weight-bold text-primary text-uppercase mb-2">Статус</div>
                                    <div id="dashboardVehicleStatus" class="dashboard-status-pill offline">Оффлайн</div>
                                </div>

                                <div class="col-lg-3 col-md-6 mb-4 mb-lg-0">
                                    <div class="text-xs font-weight-bold text-primary text-uppercase mb-2">Текущая зона</div>
                                    <div id="dashboardCurrentZone" class="dashboard-status-value">--</div>
                                </div>

                                <div class="col-lg-3 col-md-6 mb-4 mb-md-0">
                                    <div class="text-xs font-weight-bold text-primary text-uppercase mb-2">Скорость</div>
                                    <div id="dashboardCurrentSpeed" class="dashboard-status-value">--</div>
                                </div>

                                <div class="col-lg-3 col-md-6">
                                    <div class="text-xs font-weight-bold text-primary text-uppercase mb-2">Вес</div>
                                    <div id="dashboardCurrentWeight" class="dashboard-status-value">--</div>
                                </div>
                            </div>

                            <hr>

                            <div class="small text-muted mb-1">Последнее обновление по timestamp пакета</div>
                            <div id="dashboardLastPacketTime" class="font-weight-bold text-gray-800">--</div>
                        </div>

                    </div>

                </div>

            </div>
