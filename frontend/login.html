<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title>Вход</title>

    <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,300,400,600,700,800,900" rel="stylesheet">
    <link href="css/sb-admin-2.min.css" rel="stylesheet">
    <style>
        .password-toggle-wrap {
            position: relative;
        }

        .password-toggle-input {
            padding-right: 110px;
        }

        .password-toggle-button {
            position: absolute;
            top: 50%;
            right: 16px;
            transform: translateY(-50%);
            border: 0;
            background: transparent;
            color: #4e73df;
            font-weight: 700;
            font-size: 0.85rem;
            padding: 0;
        }

        .password-toggle-button:focus {
            outline: none;
        }
    </style>
    <script src="js/app-auth.js?v=20260331c"></script>
</head>

<body class="bg-gradient-primary">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-xl-10 col-lg-12 col-md-9">
                <div class="card o-hidden border-0 shadow-lg my-5">
                    <div class="card-body p-0">
                        <div class="row">
                            <div class="col-lg-6 d-none d-lg-block bg-login-image"></div>

                            <div class="col-lg-6">
                                <div class="p-5">
                                    <div class="text-center">
                                        <h1 class="h4 text-gray-900 mb-4">Вход в систему</h1>
                                    </div>

                                    <div data-page-alerts></div>

                                    <form class="user" id="loginForm">
                                        <div class="form-group">
                                            <input id="login" type="text" class="form-control form-control-user" placeholder="Логин" autocomplete="username">
                                        </div>

                                        <div class="form-group password-toggle-wrap">
                                            <input id="password" type="password" class="form-control form-control-user password-toggle-input" placeholder="Пароль" autocomplete="current-password">
                                            <button id="togglePasswordBtn" type="button" class="password-toggle-button" aria-label="Показать пароль">
                                                Показать
                                            </button>
                                        </div>

                                        <button id="loginBtn" type="submit" class="btn btn-primary btn-user btn-block">
                                            Войти
                                        </button>
                                    </form>

                                    <hr>

                                    <p class="small text-muted mb-0 text-center">
                                        Используйте выданные логин и пароль. После успешного входа откроется главная страница.
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="vendor/jquery/jquery.min.js"></script>
    <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="vendor/jquery-easing/jquery.easing.min.js"></script>
    <script src="js/sb-admin-2.min.js"></script>
    <script src="js/login.js?v=20260331c"></script>
</body>

</html>
